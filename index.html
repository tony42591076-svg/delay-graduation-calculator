<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>延畢計算機</title>
</head>
<body>

<h2>延畢計算機</h2>

<textarea id="input" rows="18" cols="90" placeholder="請貼上成績"></textarea>
<br><br>

<button onclick="handle()">解析</button>

<h3>總結果</h3>
<div id="finalResult"></div>

<h3>解析結果</h3>
<div id="summary"></div>

<h3>已通過課程</h3>
<ul id="passedList"></ul>

<h3>未通過課程</h3>
<ul id="failedList"></ul>

<h3>未評定課程</h3>
<ul id="pendingList"></ul>

<h3>畢業條件檢查</h3>
<ul id="requirementSummary"></ul>

<script src="script.js"></script>

</body>
</html>
